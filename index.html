<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Controle MotoBoy</title>
  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      padding: 20px;
    }
    h1 {
      text-align: center;
    }
    .container {
      max-width: 500px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
    }
    button {
      width: 100%;
      padding: 10px;
      background: green;
      color: white;
      border: none;
      margin-top: 10px;
      cursor: pointer;
    }
    .resultado {
      margin-top: 20px;
      background: #e6ffe6;
      padding: 10px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<h1>Controle de MotoBoy</h1>

<div class="container">

  <input id="ganhos" type="number" placeholder="Ganhos do dia (R$)">
  <input id="gastos" type="number" placeholder="Gastos (R$)">
  <input id="viagens" type="number" placeholder="Número de viagens">

  <button onclick="calcular()">Calcular</button>

  <div class="resultado" id="resultado"></div>

</div>

<script>
function calcular() {
  let ganhos = Number(document.getElementById('ganhos').value);
  let gastos = Number(document.getElementById('gastos').value);
  let viagens = Number(document.getElementById('viagens').value);

  let lucro = ganhos - gastos;

  document.getElementById('resultado').innerHTML =
    "💰 Ganho: R$ " + ganhos +
    "<br>💸 Gastos: R$ " + gastos +
    "<br>🏍 Viagens: " + viagens +
    "<br><b>📊 Lucro do dia: R$ " + lucro + "</b>";
}
</script>

</body>
</html>
