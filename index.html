<!DOCTYPE html><html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Finance Pro Max</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body{font-family:Arial;background:#f4f4f4;margin:0;padding:12px}
    h1{text-align:center}
    .card{background:#fff;padding:12px;border-radius:12px;margin-bottom:12px}
    input,select{width:100%;padding:10px;margin:5px 0}
    button{width:100%;padding:10px;border:none;border-radius:8px;margin-top:6px;cursor:pointer}
    .add{background:green;color:#fff}
    .danger{background:red;color:#fff}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .box{background:#eef;padding:10px;border-radius:10px}
    .neg{color:red;font-weight:bold}
    .pos{color:green;font-weight:bold}
    ul{list-style:none;padding:0}
    li{background:#fff;margin:5px 0;padding:10px;border-radius:10px}
    canvas{background:#fff;border-radius:10px;padding:10px}
  </style>
</head>
<body><h1>📊 Finance Pro Max</h1><div class="card">
  <input type="number" id="value" placeholder="Valor R$" />
  <input type="number" id="hours" placeholder="Horas trabalhadas" />
  <input type="number" id="km" placeholder="Km rodados" />
  <input type="date" id="date" />  <select id="type">
    <option value="income">💰 Ganho</option>
    <option value="expense">💸 Gasto</option>
  </select>  <select id="category">
    <option value="gasolina">⛽ Gasolina</option>
    <option value="manutencao">🔧 Manutenção</option>
    <option value="comida">🍔 Comida</option>
    <option value="aluguel_moto">🏍 Moto</option>
    <option value="casa">🏠 Casa</option>
    <option value="internet">🌐 Internet</option>
    <option value="cartao">💳 Cartão</option>
    <option value="emprestimo">🏦 Empréstimo</option>
    <option value="outros">📦 Outros</option>
  </select><button class="add" onclick="add()">Adicionar</button>

</div><div class="card grid">
  <div class="box">💰 Ganhos: <span id="income">0</span></div>
  <div class="box">💸 Gastos: <span id="expense">0</span></div>
  <div class="box" id="profitBox">📊 Lucro: <span id="profit">0</span></div>
  <div class="box">⏱ Hora: <span id="hourly">0</span></div>
  <div class="box">📍 Km: <span id="kmrate">0</span></div>
  <div class="box">🎯 Meta diária: <span id="goal">0</span></div>
</div><div class="card">
  <button onclick="filter('day')">Hoje</button>
  <button onclick="filter('week')">Semana</button>
  <button onclick="filter('month')">Mês</button>
</div><div class="card">
  <h3>📈 Lucro diário</h3>
  <canvas id="chart"></canvas>
</div><div class="card">
  <h3>💳 Dívidas / Cartões</h3>
  <input id="debtValue" placeholder="Valor dívida" type="number" />
  <input id="debtName" placeholder="Nome (cartão/empréstimo)" />
  <button class="add" onclick="addDebt()">Adicionar dívida</button>
  <ul id="debts"></ul>
</div><div class="card">
  <h3>📅 Histórico</h3>
  <ul id="list"></ul>
</div><script>
let data = JSON.parse(localStorage.getItem('data')) || [];
let debts = JSON.parse(localStorage.getItem('debts')) || [];
let currentFilter='all';

function save(){
  localStorage.setItem('data',JSON.stringify(data));
  localStorage.setItem('debts',JSON.stringify(debts));
}

function add(){
  let v=Number(value.value);
  if(!v)return;
  data.push({
    value:v,
    type:type.value,
    cat:category.value,
    hours:Number(hours.value)||0,
    km:Number(km.value)||0,
    date:date.value||new Date().toISOString().split('T')[0]
  });
  save();render();
}

function addDebt(){
  let v=Number(debtValue.value);
  if(!v)return;
  debts.push({name:debtName.value,value:v});
  save();render();
}

function filter(f){currentFilter=f;render();}

function getFiltered(){
  let today=new Date().toISOString().split('T')[0];
  if(currentFilter==='day')return data.filter(d=>d.date===today);
  if(currentFilter==='week')return data.slice(-7);
  if(currentFilter==='month')return data.slice(-30);
  return data;
}

function render(){
  let list=document.getElementById('list');
  let dep=document.getElementById('debts');
  list.innerHTML='';dep.innerHTML='';

  let d=getFiltered();

  let inc=0,exp=0,h=0,k=0;

  d.forEach(i=>{
    if(i.type==='income')inc+=i.value;else exp+=i.value;
    h+=i.hours;k+=i.km;
    let li=document.createElement('li');
    li.innerHTML=`${i.date} | ${i.cat} | ${i.type} | R$${i.value}`;
    list.appendChild(li);
  });

  debts.forEach((d,i)=>{
    let li=document.createElement('li');
    li.innerHTML=`${d.name} - R$${d.value}`;
    dep.appendChild(li);
  });

  let profit=inc-exp;
  let hourly=h?profit/h:0;
  let kmr=k?profit/k:0;

  income.innerText=inc.toFixed(2);
  expense.innerText=exp.toFixed(2);
  profit.innerText=profit.toFixed(2);
  hourly.innerText=hourly.toFixed(2);
  kmrate.innerText=kmr.toFixed(2);

  profitBox.className=profit<0?'box neg':'box pos';

  draw(d);
}

let chart;
function draw(d){
  let labels=[],vals=[],sum=0;
  d.forEach(x=>{
    sum+=x.type==='income'?x.value:-x.value;
    labels.push(x.date);
    vals.push(sum);
  });

  if(chart)chart.destroy();
  chart=new Chart(chartCanvas,{type:'line',data:{labels,datasets:[{data:vals,borderColor:'green'}]}});
}

render();
</script><canvas id="chart"></canvas>

<script>const chartCanvas=document.getElementById('chart');</script></body>
</html>
