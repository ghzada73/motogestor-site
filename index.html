<!DOCTYPE html><html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MotoFinance Black</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial;background:#0b1020;color:#fff;padding:15px;padding-bottom:100px}
    .hidden{display:none}
    .header,.row,.tabs{display:flex;justify-content:space-between;align-items:center}
    .tabs{gap:8px;margin:15px 0;flex-wrap:wrap}
    .tab-btn{flex:1;padding:10px;border:none;border-radius:12px;background:#1a2238;color:#fff;cursor:pointer}
    .active{background:#22c55e !important}
    .card{background:#121a2f;border-radius:18px;padding:16px;margin-bottom:14px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .blue{color:#22d3ee}.red{color:#ff4d6d}.green{color:#22c55e}.yellow{color:#facc15}.muted{color:#94a3b8;font-size:13px}
    input,select{width:100%;padding:12px;margin-top:8px;border:none;border-radius:10px;background:#1a2238;color:#fff}
    button.primary{width:100%;padding:14px;margin-top:10px;border:none;border-radius:12px;background:#22c55e;color:white;font-weight:bold;cursor:pointer}
    ul{list-style:none;padding:0;margin:0}
    li{background:#1a2238;margin-top:8px;padding:12px;border-radius:12px}
    canvas{margin-top:10px;background:#0f172a;border-radius:14px;padding:10px}
    .edit-btn{background:none;border:none;color:#22d3ee;cursor:pointer}
    .progress{height:10px;background:#1a2238;border-radius:10px;overflow:hidden;margin-top:8px}
    .progress-bar{height:100%;background:#22c55e}
  </style>
</head>
<body>
<div class="header">
  <h1>🏍️ MotoFinance Black</h1>
  <div>📅 <span id="currentMonth"></span></div>
</div><div class="tabs">
  <button class="tab-btn active" onclick="showTab('dashboard', event)">🏠 Dashboard</button>
  <button class="tab-btn" onclick="showTab('cards', event)">💳 Cartões</button>
  <button class="tab-btn" onclick="showTab('debts', event)">🏦 Dívidas</button>
  <button class="tab-btn" onclick="showTab('reports', event)">📊 Relatórios</button>
</div><div id="dashboard">
  <div class="grid">
    <div class="card"><div class="muted">Ganhos Totais</div><h2 class="blue">R$ <span id="income">0</span></h2></div>
    <div class="card"><div class="muted">Despesas Totais</div><h2 class="red">R$ <span id="expense">0</span></h2></div>
    <div class="card"><div class="muted">Lucro Líquido</div><h2 class="green">R$ <span id="profit">0</span></h2></div>
    <div class="card"><div class="muted">Meta Diária</div><h2 class="yellow">R$ <span id="goal">0</span></h2></div>
  </div>
  <div class="card"><h3>📈 Evolução Financeira</h3><canvas id="financeChart"></canvas></div>
</div><div id="cards" class="hidden">
  <div class="card">
    <h3>💳 Cartão Completo</h3>
    <input id="cardName" placeholder="Nome do cartão">
    <input id="cardLimit" type="number" placeholder="Limite total">
    <input id="cardDebt" type="number" placeholder="Fatura atual">
    <input id="cardClosing" placeholder="Fechamento (dia)">
    <input id="cardDue" placeholder="Vencimento (dia)">
    <button class="primary" onclick="addCard()">Adicionar Cartão</button>
    <ul id="cardsList"></ul>
  </div>
</div><div id="debts" class="hidden">
  <div class="card">
    <h3>🏦 Dívidas Premium</h3>
    <input id="debtName" placeholder="Nome da dívida">
    <input id="debtTotal" type="number" placeholder="Valor total">
    <input id="debtPaid" type="number" placeholder="Valor pago">
    <input id="debtInstallments" type="number" placeholder="Parcelas totais">
    <button class="primary" onclick="addDebt()">Adicionar Dívida</button>
    <ul id="debtsList"></ul>
  </div>
</div><div id="reports" class="hidden">
  <div class="card">
    <h3>📊 Relatórios Inteligentes</h3>
    <div>Lucro semanal médio: R$ <span id="weeklyAvg">0</span></div>
    <div>Previsão mensal: R$ <span id="monthlyForecast">0</span></div>
    <div>Saúde financeira: <span id="financialHealth">--</span></div>
    <canvas id="expenseChart"></canvas>
  </div>
</div><script>
let entries = JSON.parse(localStorage.getItem('moto_finance')) || [];
let cards = JSON.parse(localStorage.getItem('cards')) || [];
let debts = JSON.parse(localStorage.getItem('debts')) || [];
let fixedBills = JSON.parse(localStorage.getItem('fixed_bills')) || {};
let financeChart, expenseChart;

document.getElementById('currentMonth').innerText = new Date().toLocaleDateString('pt-BR',{month:'long',year:'numeric'});

function saveAll(){
 localStorage.setItem('moto_finance', JSON.stringify(entries));
 localStorage.setItem('cards', JSON.stringify(cards));
 localStorage.setItem('debts', JSON.stringify(debts));
}

function showTab(tab,event){
 ['dashboard','cards','debts','reports'].forEach(id=>document.getElementById(id).classList.add('hidden'));
 document.getElementById(tab).classList.remove('hidden');
 document.querySelectorAll('.tab-btn').forEach(btn=>btn.classList.remove('active'));
 event.target.classList.add('active');
}

function addCard(){
 cards.push({
  name:cardName.value,
  limit:Number(cardLimit.value),
  debt:Number(cardDebt.value),
  closing:cardClosing.value,
  due:cardDue.value
 });
 saveAll(); renderCards(); render();
}

function renderCards(){
 cardsList.innerHTML='';
 cards.forEach(card=>{
  const usage=((card.debt/card.limit)*100).toFixed(1);
  const li=document.createElement('li');
  li.innerHTML=`<strong>${card.name}</strong><br>
  Limite: R$${card.limit} | Fatura: R$${card.debt}<br>
  Fechamento: Dia ${card.closing} | Vencimento: Dia ${card.due}<br>
  Uso: ${usage}%
  <div class='progress'><div class='progress-bar' style='width:${usage}%'></div></div>`;
  cardsList.appendChild(li);
 });
}

function addDebt(){
 debts.push({
  name:debtName.value,
  total:Number(debtTotal.value),
  paid:Number(debtPaid.value),
  installments:Number(debtInstallments.value)
 });
 saveAll(); renderDebts(); render();
}

function renderDebts(){
 debtsList.innerHTML='';
 debts.forEach(debt=>{
  const progress=((debt.paid/debt.total)*100).toFixed(1);
  const remaining=(debt.total-debt.paid).toFixed(2);
  const li=document.createElement('li');
  li.innerHTML=`<strong>${debt.name}</strong><br>
  Pago: R$${debt.paid} / R$${debt.total}<br>
  Restante: R$${remaining} | Parcelas: ${debt.installments}
  <div class='progress'><div class='progress-bar' style='width:${progress}%'></div></div>`;
  debtsList.appendChild(li);
 });
}

function render(){
 let income = entries.filter(e=>e.type==='income').reduce((a,b)=>a+b.value,0);
 let expense = entries.filter(e=>e.type==='expense').reduce((a,b)=>a+b.value,0);
 let cardDebt = cards.reduce((a,b)=>a+b.debt,0);
 let debtRemaining = debts.reduce((a,b)=>a+(b.total-b.paid),0);
 let fixed = Object.values(fixedBills).reduce((a,b)=>a+b,0);
 expense += cardDebt + debtRemaining + fixed;
 let profit = income - expense;
 let goal = (expense/30).toFixed(2);

 incomeEl(income); expenseEl(expense); profitEl(profit); goalEl(goal);
 renderReports(income, expense, profit);
 drawCharts();
}

function renderReports(income, expense, profit){
 const weeklyAvg = (profit/4).toFixed(2);
 const monthlyForecast = (profit*1.15).toFixed(2);
 let health = profit > 0 ? '🟢 Positiva' : '🔴 Negativa';
 weeklyAvgEl(weeklyAvg);
 monthlyForecastEl(monthlyForecast);
 financialHealthEl(health);
}

function drawCharts(){
 const labels = entries.map((e,i)=>`#${i+1}`);
 let cumulative=[]; let total=0; let categories={};
 entries.forEach(e=>{
  total += e.type==='income'?e.value:-e.value;
  cumulative.push(total);
  if(e.type==='expense') categories[e.category]=(categories[e.category]||0)+e.value;
 });

 if(financeChart) financeChart.destroy();
 financeChart = new Chart(document.getElementById('financeChart'), {
  type:'bar',
  data:{labels,datasets:[{data:cumulative,backgroundColor:'#22d3ee'}]},
  options:{plugins:{legend:{display:false}}}
 });

 if(expenseChart) expenseChart.destroy();
 expenseChart = new Chart(document.getElementById('expenseChart'), {
  type:'doughnut',
  data:{labels:Object.keys(categories),datasets:[{data:Object.values(categories)}]}
 });
}

function incomeEl(v){income.innerText=v.toFixed(2)}
function expenseEl(v){expense.innerText=v.toFixed(2)}
function profitEl(v){profit.innerText=v.toFixed(2)}
function goalEl(v){goal.innerText=v}
function weeklyAvgEl(v){weeklyAvg.innerText=v}
function monthlyForecastEl(v){monthlyForecast.innerText=v}
function financialHealthEl(v){financialHealth.innerText=v}

renderCards();
renderDebts();
render();
</script></body>
</html>
